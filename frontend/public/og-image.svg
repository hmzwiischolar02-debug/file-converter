<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   style="stop-color:#0f172a"/>
      <stop offset="50%"  style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Dot grid -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="1" fill="rgba(255,255,255,0.08)"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Logo icon -->
  <rect x="80" y="80" width="64" height="64" rx="16" fill="url(#accent)"/>
  <text x="112" y="124" font-family="Arial Black, sans-serif" font-size="32" font-weight="900" fill="white" text-anchor="middle">F</text>

  <!-- Brand name -->
  <text x="160" y="128" font-family="Arial, sans-serif" font-size="28" font-weight="800" fill="white">File<tspan fill="#60a5fa">Convert</tspan></text>

  <!-- Main headline -->
  <text x="80" y="260" font-family="Arial Black, sans-serif" font-size="64" font-weight="900" fill="white">Convert Any File</text>
  <text x="80" y="340">
    <tspan font-family="Arial Black, sans-serif" font-size="64" font-weight="900" fill="url(#accent)">Instantly.</tspan>
    <tspan font-family="Arial Black, sans-serif" font-size="64" font-weight="900" fill="white"> 100% Free.</tspan>
  </text>

  <!-- Subheadline -->
  <text x="80" y="410" font-family="Arial, sans-serif" font-size="28" fill="#94a3b8">18 tools — PDF, Word, Excel, Images and more. No signup required.</text>

  <!-- Tool pills -->
  <rect x="80"  y="460" width="160" height="40" rx="20" fill="rgba(59,130,246,0.2)" stroke="#3b82f6" stroke-width="1"/>
  <text x="160" y="486" font-family="Arial, sans-serif" font-size="16" fill="#93c5fd" text-anchor="middle">PDF to Word</text>

  <rect x="252" y="460" width="160" height="40" rx="20" fill="rgba(124,58,237,0.2)" stroke="#7c3aed" stroke-width="1"/>
  <text x="332" y="486" font-family="Arial, sans-serif" font-size="16" fill="#a78bfa" text-anchor="middle">Word to PDF</text>

  <rect x="424" y="460" width="150" height="40" rx="20" fill="rgba(5,150,105,0.2)" stroke="#059669" stroke-width="1"/>
  <text x="499" y="486" font-family="Arial, sans-serif" font-size="16" fill="#6ee7b7" text-anchor="middle">JPG to PDF</text>

  <rect x="586" y="460" width="170" height="40" rx="20" fill="rgba(8,145,178,0.2)" stroke="#0891b2" stroke-width="1"/>
  <text x="671" y="486" font-family="Arial, sans-serif" font-size="16" fill="#67e8f9" text-anchor="middle">Merge PDF</text>

  <rect x="768" y="460" width="190" height="40" rx="20" fill="rgba(220,38,38,0.2)" stroke="#dc2626" stroke-width="1"/>
  <text x="863" y="486" font-family="Arial, sans-serif" font-size="16" fill="#fca5a5" text-anchor="middle">Compress PDF</text>

  <!-- Right side decoration -->
  <circle cx="1050" cy="200" r="200" fill="rgba(59,130,246,0.05)" stroke="rgba(59,130,246,0.1)" stroke-width="1"/>
  <circle cx="1050" cy="200" r="140" fill="rgba(124,58,237,0.05)" stroke="rgba(124,58,237,0.1)" stroke-width="1"/>
  <text x="1050" y="160" font-family="Arial, sans-serif" font-size="80" text-anchor="middle">📄</text>
  <text x="990"  y="260" font-family="Arial, sans-serif" font-size="48" text-anchor="middle">→</text>
  <text x="1110" y="260" font-family="Arial, sans-serif" font-size="80" text-anchor="middle">📝</text>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="rgba(0,0,0,0.3)"/>
  <text x="600" y="616" font-family="Arial, sans-serif" font-size="18" fill="#64748b" text-anchor="middle">file-converters.vercel.app · Free · No signup · Instant results</text>
</svg>